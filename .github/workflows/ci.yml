name: Customer Intelligence Platform End-to-End CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    
    steps:
    # ── 1. Check out repository code ────────────────────────────────
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ── 2. Set up Python environment ────────────────────────────────
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    # ── 3. Install required dependencies ─────────────────────────────
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ── 4. Execute Data Ingestion & Validation Stage ────────────────
    - name: Data Ingestion and Validation
      run: |
        python src/data_pipeline/ingest.py

    # ── 5. Run ML Model Training & Registry Stage ────────────────────
    - name: ML Model Training and Tracking
      run: |
        python src/training/train.py

    # ── 6. Build RAG Vector Index Stage ──────────────────────────────
    - name: Build RAG Index
      run: |
        python src/rag/index_builder.py

    # ── 7. Run Unit and Integration Pytest Suite ─────────────────────
    - name: Run Test Suite (Pytest)
      run: |
        PYTHONPATH=. pytest -v

    # ── 8. Run Evidently Drift Monitoring Stage ──────────────────────
    - name: Run Evidently Drift Analysis
      run: |
        python monitoring/drift_analyzer.py

    # ── 9. Enforce MLOps CI/CD Quality Performance Gate ─────────────
    - name: Enforce MLOps Production Quality Gate
      run: |
        python tests/ci_quality_gate.py
